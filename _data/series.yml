# Planned outline for post series.
#
# Each entry's `name` matches the `series:` front-matter value on posts. The
# `sections` define the full planned structure; each part's `title` is used for
# parts that are not yet published (rendered as "Coming Soon"). Once a post with a
# matching `series_part` is published, its own title and URL take over.
#
# This is the single source of truth for series structure -- adding a planned part
# here (before its post exists) makes it appear as "Coming Soon" on the series page
# and in the per-post series sidebar.

