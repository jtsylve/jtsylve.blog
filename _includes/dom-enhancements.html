<script>
    // Open external links in a new window
    document.querySelectorAll("a[href]").forEach(function(link) {
        if (link.hostname !== location.hostname) {
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            var span = document.createElement("span");
            span.className = "sr-only";
            span.textContent = " (opens in new tab)";
            link.appendChild(span);
        }
    });

    // Wrap tables in scrollable container for mobile overflow
    document.querySelectorAll("article.post table").forEach(function(table) {
        var wrapper = document.createElement("div");
        wrapper.className = "table-wrapper";
        table.parentNode.insertBefore(wrapper, table);
        wrapper.appendChild(table);
    });

    // Make scrollable containers keyboard-accessible (WCAG SC 2.1.1)
    document.querySelectorAll("pre, .table-wrapper, .series-toc").forEach(function(el) {
        if (el.scrollWidth > el.clientWidth || el.scrollHeight > el.clientHeight) {
            el.setAttribute("tabindex", "0");
            el.setAttribute("role", "region");
            var label = el.classList.contains("series-toc")
              ? "Series table of contents"
              : el.classList.contains("table-wrapper")
              ? "Scrollable table"
              : "Scrollable code block";
            el.setAttribute("aria-label", label);
        }
    });
</script>
