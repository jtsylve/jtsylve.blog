    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f0f14" media="(prefers-color-scheme: dark)">

    <link rel="preload" href="/assets/fonts/inter-latin-400.woff2"
          as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/jetbrains-mono-latin-400.woff2"
          as="font" type="font/woff2" crossorigin>

    {% if page.excerpt %}
    <meta name="description" content="{{ page.excerpt | strip_html | escape }}">
    <meta property="og:description" content="{{ page.excerpt | strip_html | escape }}">
    {% else %}
    <meta name="description" content="{{ site.description | escape }}">
    <meta property="og:description" content="{{ site.description | escape }}">
    {% endif %}
    <meta name="author" content="{{ site.name }}">

    {% if page.title %}
    <meta property="og:title" content="{{ page.title | escape }}">
    {% endif %}
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
    <meta property="og:site_name" content="{{ site.name }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:site" content="@{{ site.footer-links.twitter }}">

    {% if page.layout == "post" %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": "{{ page.title | escape }}",
      "datePublished": "{{ page.date | date_to_xmlschema }}",
      "author": {
        "@type": "Person",
        "name": "Joe T. Sylve",
        "url": "https://jtsylve.blog"
      },
      "publisher": {
        "@type": "Person",
        "name": "Joe T. Sylve"
      },
      "description": "{{ page.excerpt | strip_html | truncate: 200 | escape }}"
    }
    </script>
    {% endif %}
